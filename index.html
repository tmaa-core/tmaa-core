<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-CORE | Metropolitan Management Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Share+Tech+Mono&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-black: #05070a;
            --surface: rgba(10, 15, 25, 0.9);
            --text-white: #ffffff;
            --text-dim: #71717a;
            --cyan-glow: #00f2ff;
            --error-red: #ff3b3b;
            --indigo-glow: #7c3aed;
            --border-glow: rgba(0, 242, 255, 0.3);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-black); background-image: radial-gradient(circle at center, #0f172a 0%, #05070a 100%); color: var(--text-white); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        header { width: 100%; padding: 3rem 0; text-align: center; border-bottom: 1px solid var(--border-glow); position: relative; }
        header h1 { margin: 0; font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: clamp(2.5rem, 8vw, 4rem); letter-spacing: -3px; color: var(--text-white); text-transform: uppercase; text-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        header p { margin: 15px 15px 0; color: var(--text-dim); font-size: 0.65rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 600; }
        
        .tabs { margin: 30px 0; display: flex; gap: 5px; padding: 4px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-glow); }
        .tab-btn { padding: 10px 20px; border: none; background: transparent; cursor: pointer; color: var(--text-dim); font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .tab-btn.active { background: var(--cyan-glow); color: #000; box-shadow: 0 0 15px var(--cyan-glow); }

        .container { width: 92%; max-width: 900px; background: var(--surface); backdrop-filter: blur(20px); padding: 30px; border: 1px solid var(--border-glow); display: none; margin-bottom: 50px; box-sizing: border-box; }
        .container.active { display: block; }

        h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--text-white); margin-bottom: 40px; letter-spacing: 2px; text-transform: uppercase; border-left: 4px solid var(--cyan-glow); padding-left: 15px; }
        
        .form-group { margin-bottom: 30px; }
        label { display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        
        input { width: 100%; padding: 16px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0; font-size: 0.9rem; color: #fff; background: rgba(0, 0, 0, 0.5); box-sizing: border-box; font-family: 'Share Tech Mono', monospace; margin-top: 0; }
        input:focus { outline: none; border-color: var(--cyan-glow); box-shadow: 0 0 10px var(--border-glow); }

        button.main-btn { background: transparent; color: var(--cyan-glow); border: 1px solid var(--cyan-glow); padding: 18px; width: 100%; font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; letter-spacing: 4px; transition: 0.4s; margin-top: 10px; }
        button.main-btn:hover { background: var(--cyan-glow); color: #000; box-shadow: 0 0 20px var(--cyan-glow); }

        .search-box { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
        .btn-search { background: var(--indigo-glow); color: #fff; border: none; padding: 16px; font-family: 'Space Grotesk', sans-serif; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 15px rgba(124, 58, 237, 0.2); }

        .section-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 800; color: var(--text-white); margin: 40px 0 15px 0; letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px solid var(--border-glow); padding-bottom: 8px; }
        .table-wrapper { width: 100%; overflow-x: auto; }
        .result-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .result-table th { text-align: left; padding: 12px 0; font-size: 0.6rem; color: var(--text-dim); border-bottom: 1px solid var(--border-glow); letter-spacing: 2px; }
        .result-table td { padding: 20px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-weight: 600; font-size: 0.9rem; }
        
        .view-link { color: var(--cyan-glow); text-decoration: none; font-weight: 800; cursor: pointer; font-size: 0.7rem; border: 1px solid var(--cyan-glow); padding: 6px 12px; transition: 0.3s; letter-spacing: 1px; text-transform: uppercase; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); padding: 20px; box-sizing: border-box; }
        .modal-content { background: #000; margin: 10% auto; padding: 30px; width: 100%; max-width: 480px; border: 1px solid var(--cyan-glow); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); position: relative; box-sizing: border-box; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: var(--cyan-glow); line-height: 1; }
        
        .data-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); align-items: center; gap: 10px; }
        .label { color: var(--text-dim); font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; flex-shrink: 0; }
        .val { font-weight: 700; font-size: 0.95rem; color: #fff; text-align: right; word-break: break-word; }
        .val-id { font-family: 'Share Tech Mono', monospace; font-size: 1.3rem; color: var(--cyan-glow); text-shadow: 0 0 10px var(--cyan-glow); letter-spacing: 1px; text-transform: uppercase; }

        @media (min-width: 768px) {
            .search-box { flex-direction: row; gap: 0; }
            .search-box input { flex: 1; border-right: none; }
            .container { padding: 50px; }
            .modal-content { margin: 5% auto; padding: 50px; }
            .label { font-size: 0.7rem; }
            .val { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>T-CORE</h1>
    <p>TMAA CENTER OF ONLINE RECORD ENTRY</p>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('register')">REGISTRATION</button>
    <button class="tab-btn" onclick="searchTab()">DIRECTORY</button>
</div>

<div id="register" class="container active">
    <h2>NEW ADMISSION</h2>
    <div class="form-group">
        <label>CHARACTER</label>
        <input type="text" id="regChara" placeholder="ENTER NAME">
    </div>
    <div class="form-group">
        <label>FULL NAME</label>
        <input type="text" id="regFull" placeholder="ENTER FULL NAME">
    </div>
    <div class="form-group">
        <label>CHARACTER BIRTHDAY</label>
        <input type="date" id="regDob">
    </div>
    <button class="main-btn" onclick="handleRegister()">SUBMIT ADMISSION</button>
</div>

<div id="search" class="container">
    <h2>DIRECTORY ACCESS</h2>
    <div class="search-box">
        <input type="text" id="queryInput" placeholder="SCAN BY NAME OR CHARACTER...">
        <button class="btn-search" onclick="doSearch()">SCAN DIRECTORY</button>
    </div>
    <div id="resultsArea" style="display:none;">
        <div id="adminGroup" style="display:none;"><div class="section-title">MANAGEMENT</div><div class="table-wrapper"><table class="result-table"><thead><tr><th>NAME</th><th>CHARACTER</th><th style="text-align:right">DOSSIER</th></tr></thead><tbody id="adminBody"></tbody></table></div></div>
        <div id="classAGroup" style="display:none;"><div class="section-title">CLASS A (SENIOR)</div><div class="table-wrapper"><table class="result-table"><thead><tr><th>NAME</th><th>CHARACTER</th><th style="text-align:right">DOSSIER</th></tr></thead><tbody id="classABody"></tbody></table></div></div>
        <div id="classBGroup" style="display:none;"><div class="section-title">CLASS B (TRAINEE)</div><div class="table-wrapper"><table class="result-table"><thead><tr><th>NAME</th><th>CHARACTER</th><th style="text-align:right">DOSSIER</th></tr></thead><tbody id="classBBody"></tbody></table></div></div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="color:var(--cyan-glow); border-bottom: 2px solid var(--cyan-glow); padding-bottom: 10px; margin-bottom: 30px; font-family:'Space Grotesk',sans-serif;">PERSONNEL DOSSIER ACCESS</h2>
        <div id="modalBody"></div>
        <button id="modalActionBtn" class="main-btn" style="display:none; margin-top:30px;" onclick="closeModal()">CONFIRM & CLOSE</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA4OeWKKMQhne6ei6C9LAbgvQLJnVkp_Rk",
      authDomain: "tokyo-metropolitan-advanced.firebaseapp.com",
      databaseURL: "https://tokyo-metropolitan-advanced-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "tokyo-metropolitan-advanced",
      storageBucket: "tokyo-metropolitan-advanced.firebasestorage.app",
      messagingSenderId: "928042832666",
      appId: "1:928042832666:web:b46bad6113dd6ff21a92a3",
      measurementId: "G-5LFDJC1EQB"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const CURRENT_BATCH = "01";

    let shouldReload = false;

    function showTab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function searchTab() { showTab('search'); }

    function handleRegister() {
        const chara = document.getElementById('regChara').value.trim();
        const full = document.getElementById('regFull').value.trim();
        const dob = document.getElementById('regDob').value;

        if(!chara || !full || !dob) {
            showCustomModal("DATA INCOMPLETE", "Please provide all mandatory protocol data.", true);
            return;
        }

        db.ref('registry').once('value', (snap) => {
            let dupeFull = false;
            snap.forEach(c => { if(c.val().full_name.toLowerCase() === full.toLowerCase()) dupeFull = true; });
            
            if(dupeFull) {
                showCustomModal("SUBMISSION DENIED", "This name is already registered in our file.", true);
                return;
            }

            const birthdayDate = new Date(dob);
            const dayOfBirth = String(birthdayDate.getDate()).padStart(2, '0');

            const counterRef = db.ref('metadata/last_id_number');
            counterRef.once('value', (s) => {
                let num = (s.val() || 0) + 1;
                const finalID = "TM-" + CURRENT_BATCH + "-" + dayOfBirth + String(num).padStart(3, '0');
                
                const newRecord = {
                    student_id: finalID, 
                    chara_name: chara, 
                    full_name: full, 
                    birthday: dob,
                    status: "Active", 
                    period: new Date().toLocaleDateString('en-GB'),
                    kelas: "B", // Default Trainee
                    position: "Batch " + parseInt(CURRENT_BATCH) + " Student",
                    points: 0
                };

                db.ref('registry/' + finalID).set(newRecord).then(() => {
                    counterRef.set(num);
                    showAdmissionSuccess(newRecord);
                });
            });
        });
    }

    function showCustomModal(title, message, isError = false) {
        shouldReload = false;
        const modal = document.getElementById('detailModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const actionBtn = document.getElementById('modalActionBtn');

        modalTitle.innerText = title;
        modalTitle.style.color = isError ? "var(--error-red)" : "var(--cyan-glow)";
        modal.querySelector('.modal-content').style.borderColor = isError ? "var(--error-red)" : "var(--cyan-glow)";
        
        modalBody.innerHTML = `<p style="color:var(--text-white); font-weight:600; text-align:center;">${message}</p>`;
        actionBtn.style.display = "block";
        actionBtn.innerText = "UNDERSTOOD";
        modal.style.display = "block";
    }

    function showAdmissionSuccess(data) {
        shouldReload = true;
        const modal = document.getElementById('detailModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        
        modalTitle.innerText = "ADMISSION CONFIRMED";
        modalTitle.style.color = "var(--cyan-glow)";
        modal.querySelector('.modal-content').style.borderColor = "var(--cyan-glow)";

        modalBody.innerHTML = `
            <div class="data-row"><span class="label">REGISTRY ID</span><span class="val val-id">${data.student_id}</span></div>
            <div class="data-row"><span class="label">FULL NAME</span><span class="val">${data.full_name}</span></div>
            <div class="data-row"><span class="label">CHARACTER</span><span class="val">${data.chara_name}</span></div>
            <div class="data-row"><span class="label">CHARACTER BIRTHDAY</span><span class="val">${data.birthday}</span></div>
        `;
        document.getElementById('modalActionBtn').style.display = "block";
        document.getElementById('modalActionBtn').innerText = "CONFIRM & CLOSE";
        modal.style.display = "block";
    }

    function doSearch() {
        const q = document.getElementById('queryInput').value.trim().toLowerCase();
        if(!q) {
            showCustomModal("SCAN ERROR", "Scan parameter required for directory access.", true);
            return;
        }

        db.ref('registry').once('value', (snap) => {
            let mgmtH = "", classAH = "", classBH = "";
            let hasM = false, hasA = false, hasB = false;
            const mgmtPositions = ["founder", "creative team", "assistant", "secretary", "headmaster", "vice principal", "chairman"];
            
            snap.forEach(child => {
                const d = child.val();
                if(d.full_name.toLowerCase().includes(q) || d.chara_name.toLowerCase().includes(q)) {
                    const pos = (d.position || "").toLowerCase();
                    const stat = (d.status || "").toLowerCase();
                    const isManagement = mgmtPositions.some(p => pos.includes(p)) || stat === "admin";
                    const row = `<tr><td style="font-weight:700">${d.full_name}</td><td>${d.chara_name}</td><td style="text-align:right"><span class="view-link" onclick="openDetail('${child.key}')">VIEW DOSSIER</span></td></tr>`;
                    
                    if(isManagement) { mgmtH += row; hasM = true; }
                    else if(d.kelas === "A") { classAH += row; hasA = true; }
                    else { classBH += row; hasB = true; }
                }
            });
            
            if(!hasM && !hasA && !hasB) {
                showCustomModal("NOT FOUND", "No records match the provided scan identity.", true);
                return;
            }

            document.getElementById('resultsArea').style.display = "block";
            document.getElementById('adminGroup').style.display = hasM ? "block" : "none";
            document.getElementById('adminBody').innerHTML = mgmtH;
            document.getElementById('classAGroup').style.display = hasA ? "block" : "none";
            document.getElementById('classABody').innerHTML = classAH;
            document.getElementById('classBGroup').style.display = hasB ? "block" : "none";
            document.getElementById('classBBody').innerHTML = classBH;
        });
    }

    function openDetail(id) {
        shouldReload = false;
        db.ref('registry/'+id).once('value', s => {
            const d = s.val();
            const mgmtPositions = ["founder", "creative team", "assistant", "secretary", "headmaster", "vice principal", "chairman"];
            const pos = (d.position || "").toLowerCase();
            const stat = (d.status || "").toLowerCase();
            const isManagement = mgmtPositions.some(p => pos.includes(p)) || stat === "admin";
            const labelTanggal = isManagement ? "SERVICE PERIOD" : "ENROLLMENT DATE";
            
            let rankHTML = "";
            if(isManagement) {
                rankHTML = `<div class="data-row"><span class="label">POSITION</span><span class="val">${d.position}</span></div>`;
            } else {
                const batchMatch = d.position ? d.position.match(/\d+/) : "1";
                const formattedBatch = String(batchMatch).padStart(2, '0');
                rankHTML = `<div class="data-row"><span class="label">BATCH</span><span class="val">${formattedBatch}</span></div>`;
            }

            const modal = document.getElementById('detailModal');
            document.getElementById('modalTitle').innerText = "PERSONNEL DOSSIER ACCESS";
            document.getElementById('modalTitle').style.color = "var(--cyan-glow)";
            modal.querySelector('.modal-content').style.borderColor = "var(--cyan-glow)";
            document.getElementById('modalActionBtn').style.display = "none";
            
            document.getElementById('modalBody').innerHTML = `
                <div class="data-row"><span class="label">MEMBER ID</span><span class="val val-id">${id}</span></div>
                <div class="data-row"><span class="label">FULL NAME</span><span class="val">${d.full_name}</span></div>
                <div class="data-row"><span class="label">CHARACTER</span><span class="val">${d.chara_name}</span></div>
                <div class="data-row"><span class="label">CHARACTER BIRTHDAY</span><span class="val">${d.birthday || '-'}</span></div>
                ${rankHTML}
                <div class="data-row"><span class="label">STATUS</span><span class="val">${d.status}</span></div>
                <div class="data-row"><span class="label">${labelTanggal}</span><span class="val">${isManagement ? (d.period || '-') : (d.period || d.dob)}</span></div>
            `;
            modal.style.display = "block";
        });
    }

    function closeModal() { 
        document.getElementById('detailModal').style.display = "none"; 
        if(shouldReload) location.reload();
    }
</script>
</body>
</html>
