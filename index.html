<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-CORE | Metropolitan Academy Personnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-main: #f8fafc; 
            --card-bg: #ffffff; 
            --text-main: #1e293b; 
            --text-muted: #64748b; 
            --accent-gold: #bf9b30; 
            --primary-slate: #334155; 
            --input-border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; padding: 2rem 0; text-align: center; background-color: var(--card-bg); border-bottom: 1px solid var(--input-border); box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
        header h1 { margin: 0; font-family: 'Syne', sans-serif; font-weight: 800; letter-spacing: -1px; font-size: 2.8rem; color: var(--accent-gold); text-transform: uppercase; }
        header p { margin: 5px 0 0; color: var(--text-muted); font-weight: 400; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; }
        
        .tabs { margin: 40px 0; display: flex; background: var(--card-bg); padding: 5px; border-radius: 99px; border: 1px solid var(--input-border); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn { padding: 12px 30px; border: none; background: transparent; cursor: pointer; border-radius: 99px; font-weight: 700; color: var(--text-muted); transition: 0.3s; font-size: 0.9rem; }
        .tab-btn.active { background: var(--accent-gold); color: white; box-shadow: 0 4px 10px rgba(191, 155, 48, 0.2); }

        .container { width: 95%; max-width: 850px; background: var(--card-bg); padding: 50px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.03); display: none; margin-bottom: 60px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.01); }
        .container.active { display: block; }

        h2 { font-family: 'Syne', sans-serif; font-weight: 700; margin-top: 0; color: var(--primary-slate); letter-spacing: -0.5px; font-size: 1.8rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 30px; }
        label { font-weight: 700; display: block; margin-top: 25px; font-size: 0.8rem; color: var(--primary-slate); text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 16px; margin-top: 10px; border: 1px solid var(--input-border); border-radius: 12px; font-size: 1rem; color: var(--text-main); box-sizing: border-box; transition: 0.2s; background: #fafafa; }
        input:focus { outline: none; border-color: var(--accent-gold); background: #ffffff; box-shadow: 0 0 0 4px rgba(191, 155, 48, 0.1); }
        
        button.main-btn { background: var(--primary-slate); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 40px; text-transform: uppercase; letter-spacing: 1px; }
        button.main-btn:hover { background: var(--accent-gold); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(191, 155, 48, 0.15); }

        .search-box { display: flex; gap: 12px; margin-bottom: 50px; }
        .btn-search { background: var(--accent-gold); color: white; border: none; padding: 0 35px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-search:hover { background: var(--primary-slate); }

        .section-title { font-size: 0.8rem; font-weight: 800; color: var(--accent-gold); margin: 50px 0 15px 0; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid var(--input-border); padding-bottom: 10px; }
        .result-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 0.95rem; }
        .result-table th { text-align: left; padding: 18px; color: var(--text-muted); font-weight: 600; font-size: 0.8rem; border-bottom: 2px solid var(--input-border); text-transform: uppercase; letter-spacing: 1px; }
        .result-table td { padding: 18px; border-bottom: 1px solid #f1f5f9; color: var(--text-main); }
        .view-link { color: var(--accent-gold); font-weight: 700; cursor: pointer; text-decoration: none; font-size: 0.85rem; padding: 6px 18px; background: rgba(191, 155, 48, 0.05); border-radius: 8px; transition: 0.2s; text-transform: uppercase; }
        .view-link:hover { background: rgba(191, 155, 48, 0.1); }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); margin: 8% auto; padding: 45px; border-radius: 28px; width: 90%; max-width: 480px; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.1); border-top: 6px solid var(--accent-gold); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 2.2rem; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .close-btn:hover { color: var(--accent-gold); }
        
        .data-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #f1f5f9; align-items: center; }
        .label { color: var(--text-muted); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-weight: 700; color: var(--primary-slate); text-align: right; font-size: 1rem; }
    </style>
</head>
<body>

<header>
    <h1>T-CORE</h1>
    <p>TMAA Center of Online Record Entry</p>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('register')">REGISTRATION</button>
    <button class="tab-btn" onclick="showTab('search')">SEARCH</button>
</div>

<div id="register" class="container active">
    <h2>NEW ADMISSION</h2>
    <label>Character Name</label>
    <input type="text" id="regChara" placeholder="e.g. Chou Tzuyu">
    <label>Full Name</label>
    <input type="text" id="regFull" placeholder="e.g. Serafine Dysabelle">
    <label>Date of Birth</label>
    <input type="date" id="regDob">
    <button class="main-btn" onclick="handleRegister()">SUBMIT ADMISSION</button>
</div>

<div id="search" class="container">
    <h2>PERSONNEL FINDER</h2>
    <div class="search-box">
        <input type="text" id="queryInput" placeholder="Search by name or character...">
        <button class="btn-search" onclick="doSearch()">SEARCH</button>
    </div>
    <div id="resultsArea" style="display:none;">
        <div id="adminGroup" style="display:none;"><div class="section-title">MANAGEMENT TEAM</div><table class="result-table"><thead><tr><th>Full Name</th><th>Character</th><th style="text-align:right">Action</th></tr></thead><tbody id="adminBody"></tbody></table></div>
        <div id="studentGroup" style="display:none;"><div class="section-title">STUDENTS</div><table class="result-table"><thead><tr><th>Full Name</th><th>Character</th><th style="text-align:right">Action</th></tr></thead><tbody id="studentBody"></tbody></table></div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="color:var(--accent-gold); margin-bottom:30px; border-bottom: 1px solid var(--input-border);">Personnel File</h2>
        <div id="modalBody"></div>
        <button id="modalActionBtn" class="main-btn" style="display:none; margin-top:20px;" onclick="closeModal()">OK, UNDERSTOOD</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA4OeWKKMQhne6ei6C9LAbgvQLJnVkp_Rk",
      authDomain: "tokyo-metropolitan-advanced.firebaseapp.com",
      databaseURL: "https://tokyo-metropolitan-advanced-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "tokyo-metropolitan-advanced",
      storageBucket: "tokyo-metropolitan-advanced.firebasestorage.app",
      messagingSenderId: "928042832666",
      appId: "1:928042832666:web:b46bad6113dd6ff21a92a3",
      measurementId: "G-5LFDJC1EQB"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isSuccessModal = false;

    function showTab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function handleRegister() {
        const chara = document.getElementById('regChara').value.trim();
        const full = document.getElementById('regFull').value.trim();
        const dob = document.getElementById('regDob').value;
        if(!chara || !full || !dob) return alert("Please complete all required fields.");

        db.ref('registry').once('value', (snap) => {
            let dupe = false;
            snap.forEach(c => { if(c.val().chara_name.toLowerCase() === chara.toLowerCase() || c.val().full_name.toLowerCase() === full.toLowerCase()) dupe = true; });
            if(dupe) return alert("This identity is already registered in the system.");

            const DD = String(new Date(dob).getDate()).padStart(2, '0');
            const counterRef = db.ref('metadata/last_id_number');
            counterRef.once('value', (s) => {
                let num = (s.val() || 0) + 1;
                const finalID = "TM-01-" + DD + String(num).padStart(3, '0');
                
                const newRecord = {
                    student_id: finalID, 
                    chara_name: chara, 
                    full_name: full, 
                    dob: dob,
                    status: "Active", 
                    period: new Date().toLocaleDateString('en-GB'),
                    kelas: "B", 
                    position: "Student", 
                    points: 0
                };

                db.ref('registry/' + finalID).set(newRecord).then(() => {
                    counterRef.set(num);
                    showAdmissionSuccess(newRecord);
                });
            });
        });
    }

    function showAdmissionSuccess(data) {
        isSuccessModal = true;
        document.getElementById('modalTitle').innerText = "ADMISSION CONFIRMED";
        document.getElementById('modalBody').innerHTML = `
            <p style="color:var(--text-muted); margin-bottom:20px;">Your identity has been successfully integrated into the TMAA system.</p>
            <div class="data-row"><span class="label">ID</span><span class="val" style="color:var(--accent-gold)">${data.student_id}</span></div>
            <div class="data-row"><span class="label">Full Name</span><span class="val">${data.full_name}</span></div>
            <div class="data-row"><span class="label">Character</span><span class="val">${data.chara_name}</span></div>
            <div class="data-row"><span class="label">Status</span><span class="val">${data.status}</span></div>
        `;
        document.getElementById('modalActionBtn').style.display = "block";
        document.getElementById('detailModal').style.display = "block";
    }

    function doSearch() {
        const q = document.getElementById('queryInput').value.trim().toLowerCase();
        if(!q) return alert("Please enter a name to search.");

        db.ref('registry').once('value', (snap) => {
            let mgmtH = "", studentH = "";
            let hasM = false, hasS = false;
            const mgmtPositions = ["founder", "creative team", "assistant", "secretary", "headmaster", "vice principal", "rijicho", "kocho"];

            snap.forEach(child => {
                const d = child.val();
                if(d.full_name.toLowerCase().includes(q) || d.chara_name.toLowerCase().includes(q)) {
                    const pos = (d.position || "").toLowerCase();
                    const stat = (d.status || "").toLowerCase();
                    const isManagement = mgmtPositions.some(p => pos.includes(p)) || stat === "admin";
                    const row = `<tr><td style="font-weight:600">${d.full_name}</td><td>${d.chara_name}</td><td style="text-align:right"><span class="view-link" onclick="openDetail('${child.key}')">VIEW</span></td></tr>`;
                    if(isManagement) { mgmtH += row; hasM = true; }
                    else { studentH += row; hasS = true; }
                }
            });

            document.getElementById('resultsArea').style.display = "block";
            document.getElementById('adminGroup').style.display = hasM ? "block" : "none";
            document.getElementById('adminBody').innerHTML = mgmtH;
            document.getElementById('studentGroup').style.display = hasS ? "block" : "none";
            document.getElementById('studentBody').innerHTML = studentH;
            if(!hasM && !hasS) alert("No records found matching your query.");
        });
    }

    function openDetail(id) {
        isSuccessModal = false;
        db.ref('registry/'+id).once('value', s => {
            const d = s.val();
            const mgmtPositions = ["founder", "creative team", "assistant", "secretary", "headmaster", "vice principal", "rijicho", "kocho"];
            const pos = (d.position || "").toLowerCase();
            const stat = (d.status || "").toLowerCase();
            const isManagement = mgmtPositions.some(p => pos.includes(p)) || stat === "admin";
            
            const labelTanggal = isManagement ? "PERIOD" : "ENROLLMENT DATE";
            const kelasHTML = isManagement ? "" : `<div class="data-row"><span class="label">Class</span><span class="val">${d.kelas || 'B'}</span></div>`;

            document.getElementById('modalTitle').innerText = "Personnel File";
            document.getElementById('modalActionBtn').style.display = "none";
            document.getElementById('modalBody').innerHTML = `
                <div class="data-row"><span class="label">ID</span><span class="val" style="color:var(--accent-gold)">${id}</span></div>
                <div class="data-row"><span class="label">Full Name</span><span class="val">${d.full_name}</span></div>
                <div class="data-row"><span class="label">Character</span><span class="val">${d.chara_name}</span></div>
                <div class="data-row"><span class="label">Position</span><span class="val">${d.position || 'Student'}</span></div>
                ${kelasHTML}
                <div class="data-row"><span class="label">Status</span><span class="val">${d.status}</span></div>
                <div class="data-row"><span class="label">${labelTanggal}</span><span class="val">${isManagement ? (d.period || '-') : (d.period || d.dob)}</span></div>
            `;
            document.getElementById('detailModal').style.display = "block";
        });
    }

    function closeModal() { 
        document.getElementById('detailModal').style.display = "none"; 
        if(isSuccessModal) location.reload();
    }
</script>
</body>
</html>
